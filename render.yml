services:
  - type: web
    name: logpulse
    runtime: java
    rootDir: backend
    buildCommand: mvn clean install
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: logpulse-db
          property: connectionString